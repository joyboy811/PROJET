services:

  # ── Base de données PostgreSQL (commune) ──────────────────────────
  db:
    image: postgres:15
    container_name: opage-db
    restart: always
    environment:
      POSTGRES_DB:       opage_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: akramsql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend O-PAGe (Django) ──────────────────────────────
  opage-backend:
    build:
      context: ./OPAGe-Platform
      dockerfile: Dockerfile
    container_name: opage-backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./OPAGe-Platform:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME:     opage_db
      DB_USER:     postgres
      DB_PASSWORD: akramsql
      DB_HOST:     db
      DB_PORT:     5432
      USE_POSTGRES: "true"
    depends_on:
      db:
        condition: service_healthy

  # ── Backend M-PAGe (Django) ──────────────────────────────
  mpage-backend:
    build:
      context: ./M-PAG-Frontend/backend
      dockerfile: Dockerfile
    container_name: mpage-backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./M-PAG-Frontend/backend:/app
    ports:
      - "8001:8001"
    environment:
      DB_NAME:       opage_db
      DB_USER:       postgres
      DB_PASSWORD:   akramsql
      DB_HOST:       db
      DB_PORT:       5432
      USE_POSTGRES:  "true"
      OPAGE_API_URL: http://opage-backend:8000/api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8001)); s.close()\""]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      opage-backend:
        condition: service_started

  # ── Frontend M-PAGe (Vite + React) ──────────────────────────────
  mpage-frontend:
    build:
      context: ./M-PAG-Frontend
      dockerfile: Dockerfile
    container_name: mpage-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://mpage-backend:8001
    depends_on:
      mpage-backend:
        condition: service_healthy

  # ── pgAdmin (Interface de gestion PostgreSQL) ───────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opage-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: page-platform-network
    driver: bridge
